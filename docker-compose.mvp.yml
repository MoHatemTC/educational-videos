# Educational-Video MVP — minimal stack: FastAPI backend + Celery worker +
# Valkey queue + Streamlit frontend. SQLite remains the local job store; Valkey
# only carries generation/render tasks so CPU/IO-heavy work stays out of the API
# process.
#
#   docker compose -f docker-compose.mvp.yml up --build
#   backend  -> http://localhost:8000/docs
#   frontend -> http://localhost:8501

name: edu-video-mvp

services:
  valkey:
    image: valkey/valkey:8.1.6-alpine
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  backend:
    build:
      context: .
      args:
        APP_ENV: development
    image: edu-video-mvp:latest
    command: ["/app/.venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - VALKEY_HOST=valkey
      - VIDEO_TASK_QUEUE_BACKEND=celery
      - VIDEO_TASK_QUEUE_BROKER_URL=redis://valkey:6379/0
      - VIDEO_TASK_QUEUE_RESULT_BACKEND=redis://valkey:6379/0
    shm_size: "1gb"  # headless Chromium needs more than the default 64MB /dev/shm
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./vlm_render_mapper:/app/vlm_render_mapper
      - ./data:/app/data
      - ./output:/app/output
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: on-failure

  worker:
    image: edu-video-mvp:latest
    entrypoint: []
    command:
      - /app/.venv/bin/celery
      - -A
      - app.services.pipeline.task_queue:celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=1
      - -Q
      - celery
    env_file:
      - .env
    environment:
      - APP_ENV=development
      - VALKEY_HOST=valkey
      - VIDEO_TASK_QUEUE_BACKEND=celery
      - VIDEO_TASK_QUEUE_BROKER_URL=redis://valkey:6379/0
      - VIDEO_TASK_QUEUE_RESULT_BACKEND=redis://valkey:6379/0
    shm_size: "1gb"
    volumes:
      - ./app:/app/app
      - ./vlm_render_mapper:/app/vlm_render_mapper
      - ./data:/app/data
      - ./output:/app/output
    depends_on:
      valkey:
        condition: service_healthy
    restart: on-failure

  frontend:
    image: edu-video-mvp:latest
    entrypoint: []
    command:
      - /app/.venv/bin/streamlit
      - run
      - frontend/streamlit_app.py
      - --server.port=8501
      - --server.address=0.0.0.0
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      - backend
    restart: on-failure

volumes:
  valkey-data:
