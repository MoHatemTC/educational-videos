[pytest]
testpaths =
    tests
    code_and_log/tests

pythonpath =
    .
    src
    structured-outputs/src

norecursedirs =
    .git
    .venv
    __pycache__
    qdrant
    .chroma
    .chroma_test
    .pytest_tmp

addopts = --basetemp=.pytest_tmp

filterwarnings =
    ignore:There is no current event loop:DeprecationWarning:deepeval\.utils