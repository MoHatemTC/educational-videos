name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --all-extras --all-groups

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q

      - name: Pipeline DeepEval hallucination gate
        env:
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_API_BASE: ${{ vars.LITELLM_BASE_URL || 'https://management.sprints.ai/litellm' }}
          LITELLM_BASE_URL: ${{ vars.LITELLM_BASE_URL || 'https://management.sprints.ai/litellm' }}
          PIPELINE_EVAL_MODEL: ${{ vars.PIPELINE_EVAL_MODEL || 'openai/FW-Kimi-K2.6' }}
          PIPELINE_EVAL_BACKEND: deepeval
          DEEPEVAL_TELEMETRY_OPT_OUT: '1'
        run: uv run python -m evals.pipeline_eval --backend deepeval --max-hallucination-rate 0.05