name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      
      - name: Install dependencies
        run: uv sync --locked --all-extras --all-groups

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pyright
        run: uv run pyright

      - name: Pytest
        run: uv run pytest -q
      - name: Pipeline DeepEval hallucination gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.LITELLM_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.LITELLM_BASE_URL }}
          PIPELINE_EVAL_MODEL: ${{ vars.PIPELINE_EVAL_MODEL }}
          PIPELINE_EVAL_BACKEND: deepeval
        run: uv run python -m evals.pipeline_eval --backend deepeval --max-hallucination-rate 0.05

