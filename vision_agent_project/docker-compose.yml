# =============================================================================
# docker-compose.yml — Vision-Based UI Agent
#
# Usage:
#   docker-compose up --build
#
# Override the task:
#   TASK_PROMPT="Search DuckDuckGo for browser-use" docker-compose up --build
# =============================================================================

version: "3.9"

services:
  vision-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: vision-agent:latest
    container_name: vision_agent_run

    # All sensitive config comes from .env — never hard-code keys here
    env_file:
      - .env

    environment:
      # These can be overridden per-run on the CLI, e.g.:
      #   TASK_PROMPT="..." docker-compose up
      TASK_PROMPT: "${TASK_PROMPT:-Go to https://en.wikipedia.org, search for 'Computer vision', open the article, and report its first paragraph as Markdown.}"
      MAX_STEPS: "${MAX_STEPS:-30}"
      HEADLESS: "${HEADLESS:-false}"
      RECORD_VIDEO: "${RECORD_VIDEO:-true}"
      OUTPUT_DIR: "output"
      WINDOW_SIZE: "${WINDOW_SIZE:-1280x900}"
      GIF_FPS: "${GIF_FPS:-1}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"

    # Persist outputs to the host so you can inspect screenshots / GIF / video
    volumes:
      - ./output:/app/output

    # Chromium inside Docker needs a larger shared memory space
    shm_size: "2gb"

    # Required for Playwright's --no-sandbox flag (running as root in Docker)
    security_opt:
      - seccomp:unconfined

    restart: "no"
